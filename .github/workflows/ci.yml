name: CI - Validate Skills & Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          submodules: recursive

      - name: Validate shell scripts
        run: |
          shopt -s globstar nullglob
          shell_scripts=(scripts/*.sh skills/**/*.sh)
          if [ ${#shell_scripts[@]} -eq 0 ]; then
            echo "No shell scripts found"
            exit 0
          fi

          for f in "${shell_scripts[@]}"; do
            bash -n "$f"
            echo "OK: $f"
          done

      - name: Validate Python syntax
        run: |
          python3 - <<'PY'
          import compileall
          import sys

          ok = compileall.compile_dir('skills/', force=True, quiet=1)
          sys.exit(0 if ok else 1)
          PY

      - name: Validate YAML files
        run: |
          pip install pyyaml --quiet
          python3 -c "
          import yaml, sys, glob
          errors = 0
          for f in glob.glob('skills/**/*.yaml', recursive=True) + glob.glob('skills/**/*.yml', recursive=True):
              try:
                  with open(f) as fh: yaml.safe_load(fh)
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f}: {e}'); errors += 1
          sys.exit(errors)
          "

      - name: Validate JSON files
        run: |
          python3 -c "
          import json, sys, glob
          errors = 0
          for f in glob.glob('skills/**/*.json', recursive=True):
              try:
                  with open(f) as fh: json.load(fh)
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f}: {e}'); errors += 1
          sys.exit(errors)
          "

      - name: Check SKILL.md frontmatter
        run: |
          python3 -c "
          import re, sys, glob, os
          errors = 0
          for root, dirs, files in os.walk('skills'):
              if '.git' in root: continue
              if 'SKILL.md' in files:
                  path = os.path.join(root, 'SKILL.md')
                  with open(path) as f:
                      lines = f.readlines()
                  if not lines or lines[0].strip() != '---':
                      print(f'FAIL: {path}: missing frontmatter dashes'); errors += 1; continue
                  content = ''.join(lines)
                  if not re.search(r'^name:', content, re.MULTILINE):
                      print(f'FAIL: {path}: missing name field'); errors += 1
                  if not re.search(r'^description:', content, re.MULTILINE):
                      print(f'FAIL: {path}: missing description field'); errors += 1
          print(f'Checked all SKILL.md files: {\"PASS\" if errors == 0 else \"FAIL\"}')
          sys.exit(errors)
          "

      - name: Check provenance metadata
        run: python3 scripts/check_provenance.py

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          ignore_paths: skills

  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Smoke test install.sh + uninstall.sh portability
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          bash scripts/install.sh --preset minimal --target "$tmp" --agent custom
          test "$(find "$tmp" -name SKILL.md | wc -l | tr -d ' ')" -gt 0
          bash scripts/uninstall.sh --preset minimal --target "$tmp" --agent custom --no-backup --yes
          test "$(find "$tmp" -name SKILL.md 2>/dev/null | wc -l | tr -d ' ')" = "0"
          rm -rf "$tmp"
